<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>v2.3 · 5角色游戏配色方案预览</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#fafafa;font-family:'Noto Sans SC',sans-serif;color:#333;padding:24px;}
h1{text-align:center;font-family:'Noto Serif SC',serif;font-size:1.6em;color:#3b1f3d;margin-bottom:8px;}
.subtitle{text-align:center;font-size:.8em;color:#999;margin-bottom:32px;}
.chars{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;}
.char-card{width:340px;border-radius:20px;overflow:hidden;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,.06);transition:transform .3s;}
.char-card:hover{transform:translateY(-4px);}
.char-header{padding:20px 24px;display:flex;align-items:center;gap:14px;}
.char-emoji{font-size:2em;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.char-meta h2{font-family:'Noto Serif SC',serif;font-size:1.15em;letter-spacing:.08em;}
.char-meta p{font-size:.72em;color:#888;margin-top:2px;}

/* Canvas preview */
.canvas-preview{width:100%;height:220px;position:relative;overflow:hidden;}
.canvas-bg{position:absolute;inset:0;}
.canvas-tint1,.canvas-tint2{position:absolute;border-radius:50%;}
.canvas-tint1{width:60%;height:60%;top:10%;left:10%;}
.canvas-tint2{width:50%;height:50%;bottom:10%;right:10%;}
/* Lane lines */
.lane-lines{position:absolute;inset:0;display:flex;justify-content:space-between;padding:0;}
.lane-line{width:1px;height:100%;}
.lane-edge{width:1.5px;}

/* Items preview */
.items-row{display:flex;justify-content:space-around;padding:0 20px;position:absolute;bottom:60px;left:0;right:0;}
.item-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1em;position:relative;}
.item-glow{position:absolute;inset:-16px;border-radius:50%;z-index:0;}
.item-inner{position:relative;z-index:1;width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* Player preview */
.player-preview{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;}
.player-glow{width:80px;height:80px;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
.player-circle{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3em;position:relative;z-index:1;}

/* Color swatches */
.swatches{padding:16px 24px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.swatch{display:flex;align-items:center;gap:8px;}
.swatch-dot{width:24px;height:24px;border-radius:6px;flex-shrink:0;border:1px solid rgba(0,0,0,.06);}
.swatch-label{font-size:.62em;color:#888;line-height:1.3;}
.swatch-label span{display:block;font-size:1.15em;color:#555;font-weight:500;}

/* HUD preview */
.hud-preview{display:flex;justify-content:space-between;position:absolute;top:0;left:0;right:0;padding:10px 16px;background:linear-gradient(180deg,rgba(255,255,255,.9),rgba(255,255,255,.5),transparent);}
.hud-item{font-family:'Noto Serif SC',serif;font-size:.85em;font-weight:700;}
</style>
</head>
<body>

<p class="subtitle">请确认每个角色的游戏画面配色，确认后我会写入源代码</p>

<div class="chars" id="chars"></div>

    tint1: 'rgba(225,29,72,0.22)', tint2: 'rgba(190,18,60,0.12)',
    laneEdge: 'rgba(225,29,72,0.20)', laneInner: 'rgba(225,29,72,0.05)',
    collectGlow: 'rgba(225,29,72,0.24)', obstacleGlow: 'rgba(120,113,108,0.28)',

const container = document.getElementById('chars');

themes.forEach(t => {
  const card = document.createElement('div');
  card.className = 'char-card';
  card.innerHTML = `
    <!-- Header -->
    <div class="char-header">
      <div class="char-emoji" style="background:${t.canvasBg};box-shadow:0 0 16px ${t.tint1}">${t.emoji}</div>
      <div class="char-meta">
        <h2 style="color:${t.primary}">${t.name}</h2>
        <p>${t.desc} · <strong>${t.primaryName}</strong></p>
      </div>
    </div>
    <!-- Canvas Preview -->
    <div class="canvas-preview">
      <div class="canvas-bg" style="background:${t.canvasBg}"></div>
      <div class="canvas-tint1" style="background:radial-gradient(circle,${t.tint1},transparent)"></div>
      <div class="canvas-tint2" style="background:radial-gradient(circle,${t.tint2},transparent)"></div>
      <!-- Lane lines: 6 lines for 5 lanes -->
      <div class="lane-lines">
        <div class="lane-line lane-edge" style="background:${t.laneEdge}"></div>
        <div class="lane-line" style="background:${t.laneInner}"></div>
        <div class="lane-line" style="background:${t.laneInner}"></div>
        <div class="lane-line" style="background:${t.laneInner}"></div>
        <div class="lane-line" style="background:${t.laneInner}"></div>

        </div>
        <div class="item-circle">
          <div class="item-glow" style="background:radial-gradient(circle,${t.obstacleGlow},transparent)"></div>
          <div class="item-inner" style="background:${t.obstacleFill};border:2px solid ${t.obstacleStroke};box-shadow:0 0 6px ${t.obstacleGlow}">${t.obstacleIcon}</div>

        <div class="item-circle">
          <div class="item-glow" style="background:radial-gradient(circle,${t.collectGlow},transparent)"></div>
          <div class="item-inner" style="background:${t.collectFill};box-shadow:0 0 6px ${t.collectGlow}">${t.collectIcon}</div>

</body>
</html>
